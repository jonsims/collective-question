<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display — The Collective Question</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #006341; color: white; height: 100vh; overflow: hidden; }

    .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 56px; animation: fadeIn 0.6s ease; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Collection ── */
    #screen-collection { background: #006341; text-align: center; gap: 24px; }
    #screen-collection img { width: 280px; height: 280px; border-radius: 16px; }
    #screen-collection h2 { font-size: 2rem; opacity: 0.9; font-weight: 600; }
    .counter { font-size: 5rem; font-weight: 800; line-height: 1; }
    .counter-label { font-size: 1.5rem; opacity: 0.65; letter-spacing: 0.08em; text-transform: uppercase; }
    .fallback-url { font-size: 1.6rem; opacity: 0.6; letter-spacing: 0.03em; margin-top: 8px; font-family: monospace; }

    /* ── Career Chart ── */
    #screen-career_chart { background: #F5F5F2; color: #1A1A1A; align-items: flex-start; justify-content: center; gap: 28px; }
    #screen-career_chart h2 { font-size: 2.2rem; font-weight: 800; color: #006341; align-self: center; }
    .chart-container { width: 100%; max-width: 900px; }
    .chart-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
    .chart-label { width: 300px; font-size: 1.5rem; color: #222; text-align: right; flex-shrink: 0; }
    .chart-track { flex: 1; background: #ddd; border-radius: 8px; height: 36px; }
    .chart-fill { background: #006341; height: 36px; border-radius: 8px; transition: width 0.8s ease; min-width: 4px; }
    .chart-count { width: 50px; font-size: 1.4rem; font-weight: 700; color: #006341; }

    /* ── Act 1 Synthesis ── */
    #screen-act1_synthesis { background: #1A1A1A; text-align: center; gap: 44px; max-width: 1000px; margin: 0 auto; }
    .act1-career { font-size: 2rem; color: #4CAF7D; font-style: italic; line-height: 1.5; }
    .act1-divider { width: 60px; height: 3px; background: #006341; border-radius: 2px; }
    .act1-portrait { font-size: 2.2rem; line-height: 1.6; color: #eee; }
    .waiting-text { font-size: 1.8rem; color: #555; font-style: italic; }

    /* ── Raw Questions ── */
    #screen-raw_questions { background: #1A1A1A; align-items: flex-start; overflow: hidden; width: 100%; padding: 48px 64px; }
    #screen-raw_questions h2 { font-size: 1.8rem; color: #4CAF7D; margin-bottom: 28px; text-transform: uppercase; letter-spacing: 0.08em; }
    .q-scroll { overflow-y: auto; flex: 1; width: 100%; }
    .q-scroll-item { font-size: 1.5rem; color: #ccc; padding: 10px 0; border-bottom: 1px solid #2a2a2a; line-height: 1.4; }

    /* ── Clusters ── */
    #screen-clusters { background: #F5F5F2; color: #1A1A1A; gap: 36px; text-align: center; }
    #screen-clusters h2 { font-size: 2rem; font-weight: 800; color: #006341; }
    .clusters-grid { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; max-width: 1100px; }
    .cluster-card { background: #006341; color: white; border-radius: 16px; padding: 32px 36px; flex: 1; min-width: 220px; max-width: 280px; }
    .cluster-num { font-size: 4rem; font-weight: 800; }
    .cluster-name { font-size: 1.5rem; opacity: 0.9; margin-top: 8px; line-height: 1.3; }
    .cluster-example { font-size: 1.3rem; opacity: 0.65; margin-top: 12px; font-style: italic; line-height: 1.4; }

    /* ── Meta Question ── */
    #screen-meta_question { background: #006341; text-align: center; gap: 36px; }
    .eyebrow { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.65; }
    .meta-q { font-size: 3.2rem; font-weight: 800; line-height: 1.3; max-width: 960px; }
    .meta-rationale { font-size: 1.5rem; opacity: 0.6; max-width: 760px; line-height: 1.6; }

    /* ── Outlier ── */
    #screen-outlier { background: #1A1A1A; text-align: center; gap: 28px; }
    .outlier-eyebrow { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.12em; color: #4CAF7D; }
    .outlier-q { font-size: 2.4rem; font-weight: 700; line-height: 1.4; max-width: 860px; color: white; }

    /* Loading overlay */
    #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 100; }
    #loading.active { display: flex; }
    .loading-text { font-size: 1.8rem; color: #4CAF7D; }
    .dots::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
    @keyframes dots { 0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';} }

    /* Connection warning */
    #conn-warn { display: none; position: fixed; bottom: 16px; right: 16px; background: #c0392b; color: white; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; z-index: 200; }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-text">Reading <span id="loading-count">0</span> responses<span class="dots"></span></div>
</div>

<div id="conn-warn">Connection lost — retrying</div>

<!-- Collection -->
<div class="screen" id="screen-collection">
  <img id="qr-img" src="/api/qr" alt="QR Code">
  <h2>Scan to participate</h2>
  <div class="counter" id="collection-count">0</div>
  <div class="counter-label">responses in the room</div>
  <div class="fallback-url" id="fallback-url"></div>
</div>

<!-- Career Chart -->
<div class="screen" id="screen-career_chart">
  <h2>What did you want to be at age 8?</h2>
  <div class="chart-container" id="career-chart-display"></div>
</div>

<!-- Act 1 Synthesis -->
<div class="screen" id="screen-act1_synthesis">
  <div class="act1-career" id="act1-career-line"></div>
  <div class="act1-divider"></div>
  <div class="act1-portrait" id="act1-portrait"></div>
</div>

<!-- Raw Questions -->
<div class="screen" id="screen-raw_questions">
  <h2>What you wanted to ask us</h2>
  <div class="q-scroll" id="raw-q-list"></div>
</div>

<!-- Clusters -->
<div class="screen" id="screen-clusters">
  <h2>Your questions fall into…</h2>
  <div class="clusters-grid" id="clusters-display"></div>
</div>

<!-- Meta Question -->
<div class="screen" id="screen-meta_question">
  <div class="eyebrow">The question this room is really asking</div>
  <div class="meta-q" id="meta-q-text"></div>
  <div class="meta-rationale" id="meta-q-rationale"></div>
</div>

<!-- Outlier -->
<div class="screen" id="screen-outlier">
  <div class="outlier-eyebrow">One that didn't fit — but we liked it</div>
  <div class="outlier-q" id="outlier-q-text"></div>
</div>

<script>
  let currentState = '';
  let connOk = true;

  // QR code + fallback URL — all local, no external dependency
  const submitUrl = window.location.origin + '/submit';
  document.getElementById('qr-img').src = '/api/qr?url=' + encodeURIComponent(submitUrl);
  document.getElementById('fallback-url').textContent = submitUrl;

  function showScreen(state) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('screen-' + state);
    if (el) el.classList.add('active');
  }

  async function poll() {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    try {
      const r = await fetch('/api/state', { signal: controller.signal });
      const d = await r.json();

      // Connection status
      if (!connOk) { connOk = true; document.getElementById('conn-warn').style.display = 'none'; }

      // Loading overlay
      const isLoading = d.synthesizing?.act1 || d.synthesizing?.act2;
      document.getElementById('loading').classList.toggle('active', isLoading);
      if (isLoading) {
        document.getElementById('loading-count').textContent = d.count.careers + d.count.questions;
      }

      // Collection counter
      document.getElementById('collection-count').textContent = d.count.careers;

      // Career chart
      if (d.careerDistribution?.length) {
        const max = d.careerDistribution[0].count;
        document.getElementById('career-chart-display').innerHTML =
          d.careerDistribution.slice(0, 8).map(({ career, count }) =>
            `<div class="chart-row">
              <div class="chart-label">${esc(career)}</div>
              <div class="chart-track"><div class="chart-fill" style="width:${Math.round(count/max*100)}%"></div></div>
              <div class="chart-count">${count}</div>
            </div>`).join('');
      }

      // Act 1 — show result or waiting placeholder
      if (d.act1Result) {
        document.getElementById('act1-career-line').textContent = d.act1Result.career_line;
        document.getElementById('act1-career-line').className = 'act1-career';
        document.getElementById('act1-portrait').textContent = d.act1Result.talent_portrait;
        document.getElementById('act1-portrait').className = 'act1-portrait';
      } else {
        document.getElementById('act1-career-line').textContent = '';
        document.getElementById('act1-portrait').textContent = 'Waiting for synthesis...';
        document.getElementById('act1-portrait').className = 'act1-portrait waiting-text';
      }

      // Raw questions
      if (d.questions) {
        document.getElementById('raw-q-list').innerHTML =
          d.questions.map(q => `<div class="q-scroll-item">${esc(q.text)}</div>`).join('');
      }

      // Act 2 — show results or waiting placeholders
      if (d.act2Result) {
        const r2 = d.act2Result;
        document.getElementById('clusters-display').innerHTML = r2.clusters.map(c =>
          `<div class="cluster-card">
            <div class="cluster-num">${c.count}</div>
            <div class="cluster-name">${esc(c.label)}</div>
            <div class="cluster-example">"${esc(c.example_question)}"</div>
          </div>`).join('');
        document.getElementById('meta-q-text').textContent = r2.meta_question;
        document.getElementById('meta-q-text').className = 'meta-q';
        document.getElementById('meta-q-rationale').textContent = r2.meta_question_rationale;
        document.getElementById('outlier-q-text').textContent = r2.outlier_question;
      } else {
        document.getElementById('clusters-display').innerHTML = '<div class="cluster-card"><div class="cluster-name" style="opacity:0.5">Waiting for synthesis...</div></div>';
        document.getElementById('meta-q-text').textContent = 'Waiting for synthesis...';
        document.getElementById('meta-q-text').className = 'meta-q waiting-text';
        document.getElementById('meta-q-rationale').textContent = '';
        document.getElementById('outlier-q-text').textContent = 'Waiting for synthesis...';
        document.getElementById('outlier-q-text').className = 'outlier-q waiting-text';
      }

      // Switch screen
      if (d.displayState !== currentState) {
        currentState = d.displayState;
        showScreen(currentState);
      }

    } catch {
      connOk = false;
      document.getElementById('conn-warn').style.display = 'block';
    } finally {
      clearTimeout(timeout);
    }
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Resume polling immediately when tab becomes visible
  document.addEventListener('visibilitychange', () => { if (!document.hidden) poll(); });

  showScreen('collection');
  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>

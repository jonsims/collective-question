<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — The Collective Question</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; min-height: 100vh; }

    /* PIN gate */
    #pin-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    #pin-gate h2 { color: #4CAF7D; font-size: 1.4rem; }
    #pin-input { padding: 12px 20px; font-size: 1.5rem; text-align: center; border: 2px solid #444; border-radius: 8px; background: #2a2a2a; color: white; width: 160px; letter-spacing: 0.3em; }
    #pin-btn { padding: 12px 32px; background: #006341; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    #pin-error { color: #f88; font-size: 0.9rem; }

    /* Layout */
    #app { display: none; }
    header { background: #006341; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1rem; font-weight: 700; color: white; }

    .main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 1200px; margin: 0 auto; }
    .panel { background: #2a2a2a; border-radius: 10px; padding: 16px; }
    .panel h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #4CAF7D; margin-bottom: 12px; }
    .full-col { grid-column: span 2; }

    /* Stats */
    .stats { display: flex; gap: 12px; }
    .stat { background: #333; border-radius: 8px; padding: 12px 16px; flex: 1; text-align: center; }
    .stat-num { font-size: 2.2rem; font-weight: 700; color: #4CAF7D; }
    .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

    /* Buttons */
    .btn { padding: 10px 18px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-green { background: #4CAF7D; color: #1a1a1a; }
    .btn-gray { background: #444; color: #eee; }
    .btn-block { width: 100%; margin-bottom: 8px; padding: 14px; font-size: 0.95rem; }

    /* Synthesis data-readiness */
    .readiness { font-size: 0.78rem; color: #888; margin-bottom: 8px; min-height: 1.2em; }
    .readiness.ready { color: #4CAF7D; }

    /* Bar chart */
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 0.82rem; }
    .bar-label { width: 150px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .bar-track { flex: 1; background: #3a3a3a; border-radius: 3px; height: 12px; }
    .bar-fill { background: #006341; height: 12px; border-radius: 3px; transition: width 0.5s; min-width: 2px; }
    .bar-count { width: 22px; text-align: right; color: #666; font-size: 0.78rem; }

    /* Talent list */
    .talent-list { max-height: 150px; overflow-y: auto; }
    .talent-item { font-size: 0.8rem; color: #aaa; padding: 4px 0; border-bottom: 1px solid #333; line-height: 1.4; }

    /* Display controls */
    .current-state-banner { background: #1a3a2a; border: 1px solid #2a5a3a; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.85rem; }
    .current-state-banner span { color: #4CAF7D; font-weight: 700; }
    .display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .display-btn { padding: 9px 8px; background: #333; border: 2px solid transparent; border-radius: 7px; color: #ccc; font-size: 0.78rem; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
    .display-btn:hover { border-color: #4CAF7D; color: white; }
    .display-btn.active { border-color: #4CAF7D; background: #1a3a2a; color: #4CAF7D; font-weight: 700; }

    /* Result box */
    .result-box { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 0.82rem; line-height: 1.6; color: #ccc; }
    .result-label { font-size: 0.68rem; text-transform: uppercase; color: #4CAF7D; letter-spacing: 0.08em; margin-bottom: 4px; }

    /* Questions */
    .q-list { max-height: 260px; overflow-y: auto; }
    .q-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid #2a2a2a; font-size: 0.82rem; color: #ccc; }
    .q-num { color: #555; flex-shrink: 0; width: 20px; }
    .q-text { flex: 1; line-height: 1.4; }
    .q-del { background: #3a2a2a; border: none; border-radius: 4px; color: #888; cursor: pointer; font-size: 0.85rem; padding: 4px 8px; flex-shrink: 0; transition: all 0.15s; }
    .q-del:hover { background: #c0392b; color: white; }

    /* Danger zone */
    .danger-zone { border: 1px solid #4a2a2a; border-radius: 8px; padding: 14px; margin-top: 16px; }
    .danger-zone h3 { font-size: 0.75rem; text-transform: uppercase; color: #c0392b; letter-spacing: 0.08em; margin-bottom: 10px; }
    .danger-btns { display: flex; gap: 8px; }
    .btn-red { background: #2a1a1a; border: 1px solid #c0392b; color: #c0392b; }
    .btn-red:hover { background: #c0392b; color: white; }

    .spinning { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Connection dot */
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF7D; display: inline-block; margin-right: 6px; }
    .conn-dot.offline { background: #c0392b; }

    @media (max-width: 700px) { .main { grid-template-columns: 1fr; } .full-col { grid-column: span 1; } }
  </style>
</head>
<body>

<div id="pin-gate">
  <h2>Admin Access</h2>
  <input type="password" id="pin-input" placeholder="PIN" maxlength="4" inputmode="numeric" onkeydown="if(event.key==='Enter') checkPin()">
  <button class="btn btn-green" onclick="checkPin()">Enter</button>
  <div id="pin-error"></div>
</div>

<div id="app">
  <header>
    <h1><span class="conn-dot" id="conn-dot"></span>The Collective Question — Admin</h1>
  </header>

  <div class="main">

    <!-- Stats -->
    <div class="panel full-col">
      <div class="stats">
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Submissions</div></div>
        <div class="stat"><div class="stat-num" id="stat-talents">0</div><div class="stat-label">Talents</div></div>
        <div class="stat"><div class="stat-num" id="stat-questions">0</div><div class="stat-label">Questions</div></div>
      </div>
    </div>

    <!-- Career chart -->
    <div class="panel">
      <h2>Career Distribution</h2>
      <div id="career-chart"></div>
    </div>

    <!-- Talents -->
    <div class="panel">
      <h2>Hidden Talents</h2>
      <div class="talent-list" id="talent-list"></div>
    </div>

    <!-- Act 1 -->
    <div class="panel">
      <h2>Act 1 — Fun Reveal</h2>
      <div class="readiness" id="act1-readiness"></div>
      <button class="btn btn-green btn-block" id="act1-btn" onclick="synthesize('act1')">Synthesize Act 1</button>
      <button class="btn btn-gray btn-block" id="act1-retry" style="display:none" onclick="synthesize('act1')">↺ Try Again</button>
      <div id="act1-result"></div>
    </div>

    <!-- Act 2 -->
    <div class="panel">
      <h2>Act 2 — Meta Question</h2>
      <div class="readiness" id="act2-readiness"></div>
      <button class="btn btn-green btn-block" id="act2-btn" onclick="synthesize('act2')">Synthesize Act 2</button>
      <button class="btn btn-gray btn-block" id="act2-retry" style="display:none" onclick="synthesize('act2')">↺ Try Again</button>
      <div id="act2-result"></div>
    </div>

    <!-- Display control -->
    <div class="panel">
      <h2>Display Control</h2>
      <div class="current-state-banner">Now showing: <span id="current-state-label">QR / Collection</span></div>
      <div class="display-grid" id="display-grid">
        <button class="display-btn" data-state="collection" data-label="QR / Collection" onclick="setDisplay('collection')">📱 QR / Collection</button>
        <button class="display-btn" data-state="career_chart" data-label="Career Chart" onclick="setDisplay('career_chart')">📊 Career Chart</button>
        <button class="display-btn" data-state="act1_synthesis" data-label="Act 1 Synthesis" onclick="setDisplay('act1_synthesis')">✨ Act 1 Synthesis</button>
        <button class="display-btn" data-state="raw_questions" data-label="Raw Questions" onclick="setDisplay('raw_questions')">💬 Raw Questions</button>
        <button class="display-btn" data-state="clusters" data-label="Clusters" onclick="setDisplay('clusters')">🗂 Clusters</button>
        <button class="display-btn" data-state="meta_question" data-label="Meta Question" onclick="setDisplay('meta_question')">🎯 Meta Question</button>
        <button class="display-btn" data-state="outlier" data-label="Outlier" onclick="setDisplay('outlier')">🔍 Outlier</button>
      </div>
    </div>

    <!-- Questions -->
    <div class="panel">
      <h2>Questions (<span id="q-count">0</span>)</h2>
      <div class="q-list" id="q-list"></div>
    </div>

    <!-- Danger zone — bottom, protected -->
    <div class="panel full-col">
      <div class="danger-zone">
        <h3>⚠ Danger Zone</h3>
        <div class="danger-btns">
          <button class="btn btn-red" onclick="loadTestData()">Load Test Data</button>
          <button class="btn btn-red" onclick="confirmReset()">Reset Session</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let pin = '';
  let pollInterval;

  const STATE_LABELS = {
    collection: 'QR / Collection', career_chart: 'Career Chart',
    act1_synthesis: 'Act 1 Synthesis', raw_questions: 'Raw Questions',
    clusters: 'Clusters', meta_question: 'Meta Question', outlier: 'Outlier'
  };

  function checkPin() {
    const input = document.getElementById('pin-input').value;
    fetch('/api/admin/data', { headers: { 'x-admin-pin': input } }).then(r => {
      if (r.status === 401) {
        document.getElementById('pin-error').textContent = 'Wrong PIN.';
      } else {
        pin = input;
        document.getElementById('pin-gate').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        startPolling();
      }
    });
  }

  function startPolling() { refresh(); pollInterval = setInterval(refresh, 2000); }

  async function refresh() {
    try {
      const r = await fetch('/api/admin/data', { headers: { 'x-admin-pin': pin } });
      const d = await r.json();
      document.getElementById('conn-dot').className = 'conn-dot';
      updateUI(d);
    } catch {
      document.getElementById('conn-dot').className = 'conn-dot offline';
    }
  }

  function updateUI(d) {
    // Stats
    document.getElementById('stat-total').textContent = d.careers.length;
    document.getElementById('stat-talents').textContent = d.talents.length;
    document.getElementById('stat-questions').textContent = d.questions.length;
    document.getElementById('q-count').textContent = d.questions.length;

    // Readiness signals
    const a1ready = d.careers.length >= 10;
    const a2ready = d.questions.length >= 10;
    const a1r = document.getElementById('act1-readiness');
    const a2r = document.getElementById('act2-readiness');
    a1r.textContent = a1ready ? `✓ Ready — ${d.careers.length} submissions` : `Need at least 10 submissions (have ${d.careers.length})`;
    a1r.className = 'readiness' + (a1ready ? ' ready' : '');
    a2r.textContent = a2ready ? `✓ Ready — ${d.questions.length} questions` : `Need at least 10 questions (have ${d.questions.length})`;
    a2r.className = 'readiness' + (a2ready ? ' ready' : '');

    // Career chart
    const maxC = d.careerDistribution[0]?.count || 1;
    document.getElementById('career-chart').innerHTML = d.careerDistribution.slice(0, 10).map(({ career, count }) =>
      `<div class="bar-row"><div class="bar-label" title="${esc(career)}">${esc(career)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxC*100)}%"></div></div><div class="bar-count">${count}</div></div>`
    ).join('');

    // Talents
    document.getElementById('talent-list').innerHTML = d.talents.map(t => `<div class="talent-item">${esc(t)}</div>`).join('');

    // Questions
    document.getElementById('q-list').innerHTML = d.questions.map((q, i) =>
      `<div class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${esc(q.text)}</span><button class="q-del" onclick="deleteQ(${q.id})">✕</button></div>`
    ).join('');

    // Display state
    document.getElementById('current-state-label').textContent = STATE_LABELS[d.displayState] || d.displayState;
    document.querySelectorAll('.display-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.state === d.displayState));

    // Act 1 result
    if (d.act1Result) {
      document.getElementById('act1-retry').style.display = 'block';
      document.getElementById('act1-result').innerHTML = `<div class="result-box">
        <div class="result-label">Career line</div><div style="margin-bottom:10px">${esc(d.act1Result.career_line)}</div>
        <div class="result-label">Talent portrait</div><div>${esc(d.act1Result.talent_portrait)}</div></div>`;
    }

    // Act 2 result
    if (d.act2Result) {
      document.getElementById('act2-retry').style.display = 'block';
      const r = d.act2Result;
      document.getElementById('act2-result').innerHTML = `<div class="result-box">
        <div class="result-label">Clusters</div>
        ${r.clusters.map(c => `<div style="margin-bottom:4px"><span style="color:#4CAF7D;font-weight:600">${esc(c.label)}</span> — ${c.count} questions</div>`).join('')}
        <div class="result-label" style="margin-top:10px">Meta question</div>
        <div style="font-style:italic;margin-bottom:8px">"${esc(r.meta_question)}"</div>
        <div class="result-label">Outlier</div>
        <div>"${esc(r.outlier_question)}"</div></div>`;
    }

    // Synthesis button states
    updateSynthBtn('act1', d.synthesizing?.act1, !!d.act1Result, a1ready);
    updateSynthBtn('act2', d.synthesizing?.act2, !!d.act2Result, a2ready);
  }

  function updateSynthBtn(act, synthesizing, hasResult, ready) {
    const btn = document.getElementById(`${act}-btn`);
    if (synthesizing) {
      btn.disabled = true;
      btn.innerHTML = `<span class="spinning">⟳</span> Synthesizing…`;
    } else {
      btn.disabled = false;
      btn.textContent = hasResult ? `Re-synthesize ${act === 'act1' ? 'Act 1' : 'Act 2'}` : `Synthesize ${act === 'act1' ? 'Act 1' : 'Act 2'}`;
    }
  }

  async function synthesize(act) {
    const r = await fetch(`/api/admin/synthesize/${act}`, { method: 'POST', headers: { 'x-admin-pin': pin } });
    if (!r.ok) { const e = await r.json(); alert('Synthesis error: ' + e.error); }
    refresh();
  }

  async function setDisplay(state) {
    const btn = document.querySelector(`[data-state="${state}"]`);
    const origText = btn.textContent;
    btn.textContent = '✓ Sent';
    setTimeout(() => { btn.textContent = origText; }, 1000);
    await fetch('/api/admin/display', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-pin': pin }, body: JSON.stringify({ state }) });
    refresh();
  }

  async function deleteQ(id) {
    if (!confirm('Delete this question?')) return;
    await fetch(`/api/admin/question/${id}`, { method: 'DELETE', headers: { 'x-admin-pin': pin } });
    refresh();
  }

  async function loadTestData() {
    if (!confirm('Load test data? This will clear any real submissions.')) return;
    await fetch('/api/admin/load-test-data', { method: 'POST', headers: { 'x-admin-pin': pin } });
    refresh();
  }

  async function confirmReset() {
    if (!confirm('Reset the session? ALL data will be permanently cleared.')) return;
    await fetch('/api/admin/reset', { method: 'POST', headers: { 'x-admin-pin': pin } });
    refresh();
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('pin-input').focus();
</script>
</body>
</html>
